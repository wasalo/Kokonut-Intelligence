services:
  database:
    image: postgis/postgis:14-3.4
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./config/postgres/extensions.sql:/docker-entrypoint-initdb.d/02-extensions.sql:ro
    environment:
      POSTGRES_USER: kokonut
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kokonut_intelligence
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kokonut -d kokonut_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_interval: 5s
      start_period: 30s

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11.17.4
    restart: unless-stopped
    ports:
      - "8055:8055"
    volumes:
      - directus-uploads:/directus/uploads
      - ./extensions:/directus/extensions
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8055/server/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: "pg"
      DB_HOST: "database"
      DB_PORT: "5432"
      DB_DATABASE: "kokonut_intelligence"
      DB_USER: "kokonut"
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SEARCH_PATH: "public,kokonut"
      CACHE_ENABLED: "true"
      CACHE_AUTO_PURGE: "true"
      CACHE_STORE: "redis"
      REDIS: "redis://cache:6379"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8055}
      LOG_LEVEL: "info"
      WEBSOCKETS_ENABLED: "true"
      FILES_MAX_UPLOAD_SIZE: "50mb"

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - metabase-data:/metabase-data
    environment:
      MB_DB_TYPE: "postgres"
      MB_DB_DBNAME: "metabase"
      MB_DB_PORT: 5432
      MB_DB_USER: "kokonut"
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: "database"
      MB_ENABLE_EMBEDDING: "true"
      MB_EMBEDDING_APP_ORIGIN: "http://localhost:3001"
      MB_EMBEDDING_SECRET_KEY: ${METABASE_EMBEDDING_SECRET_KEY:-sandbox-dev-secret-key-change-in-production}
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./config/clickhouse/config.d:/etc/clickhouse-server/config.d:ro
    environment:
      CLICKHOUSE_DB: kokonut_analytics
      CLICKHOUSE_USER: kokonut
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres-data:
  directus-uploads:
  metabase-data:
  clickhouse-data:
  clickhouse-logs:
