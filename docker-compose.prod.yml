# Production overrides for Kokonut Intelligence
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  database:
    ports: []  # Do not expose Postgres to host
    deploy:
      resources:
        limits:
          memory: 2G

  clickhouse:
    ports: []  # Do not expose ClickHouse to host
    deploy:
      resources:
        limits:
          memory: 4G

  directus:
    ports:
      - "8055:8055"  # Expose only the API; put nginx/caddy in front for TLS
    environment:
      LOG_LEVEL: "warn"

  metabase:
    ports:
      - "3001:3000"
    deploy:
      resources:
        limits:
          memory: 2G

  cache:
    deploy:
      resources:
        limits:
          memory: 256M
