# Production overrides for Kokonut Intelligence
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This overlay keeps all services internal to Docker networks.
# Use with Caddy (default) or Traefik (docker-compose.traefik.yml) for TLS termination.
# Combine both: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.traefik.yml up -d

services:
  database:
    ports: []  # Do not expose Postgres to host
    deploy:
      resources:
        limits:
          memory: 2G

  clickhouse:
    ports: []  # Do not expose ClickHouse to host
    deploy:
      resources:
        limits:
          memory: 4G

  directus:
    # No ports exposed to host in production — accessible only through reverse proxy
    # For temporary direct access, create a local override:
    #   echo 'services: { directus: { ports: ["8055:8055"] } }' > docker-compose.debug.yml
    ports: []
    environment:
      LOG_LEVEL: "warn"

  metabase:
    # No ports exposed to host in production — accessible only through reverse proxy
    ports: []
    deploy:
      resources:
        limits:
          memory: 2G

  cache:
    deploy:
      resources:
        limits:
          memory: 256M

  caddy:
    deploy:
      resources:
        limits:
          memory: 256M
