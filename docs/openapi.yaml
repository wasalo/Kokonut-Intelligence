openapi: 3.0.3
info:
  title: Kokonut Intelligence Platform API
  description: |
    The Kokonut Intelligence Platform is a comprehensive agricultural and environmental data management system.
    Built on Directus, it provides REST and GraphQL APIs for managing farm operations, environmental monitoring,
    financial tracking, Web3 integrations, and governance workflows.

    ## Authentication
    All endpoints require Bearer token authentication unless noted otherwise.
    Obtain tokens via the `/auth/login` endpoint.

    ## Filtering
    All list endpoints support filtering via query parameters using Directus filter syntax:
    `_eq`, `_neq`, `_gt`, `_gte`, `_lt`, `_lte`, `_in`, `_nin`, `_contains`, `_starts_with`, `_ends_with`, `_null`, `_nnull`, `_between`, `_nbetween`
  version: 1.0.0
  contact:
    name: Kokonut Intelligence Support
    email: support@kokonutintelligence.com
  license:
    name: Proprietary
    url: https://kokonutintelligence.com/license

servers:
  - url: http://localhost:8055
    description: Local development server

tags:
  - name: Authentication
    description: Token-based authentication operations
  - name: Master Data
    description: Core entities (locations, farms, plots, crops, partners, etc.)
  - name: Operations
    description: Farm activities, harvests, sales, expenses, labor, field notes
  - name: Finance
    description: Financial transactions, cost allocations, NOI snapshots, cash flow
  - name: Environmental
    description: Soil, species, remote sensing, weather, sensors, alerts, MRV claims
  - name: Web3
    description: Wallets, on-chain activities, attestations, treasury, indexer status
  - name: Governance
    description: Metric definitions, schema versioning, approvals, workflows, webhooks
  - name: Modeled Outputs
    description: Forecasts, reports, AI summaries, dashboard datasets
  - name: Ingestion
    description: Price observations and ingestion logs
  - name: Items
    description: Generic CRUD operations for all collections
  - name: Schema
    description: Schema management endpoints
  - name: GraphQL
    description: GraphQL API endpoint
  - name: Files
    description: File upload and retrieval

security:
  - BearerAuth: []

paths:
  /auth/login:
    post:
      operationId: login
      tags: [Authentication]
      summary: Authenticate user and obtain tokens
      description: Returns access and refresh tokens for the provided credentials.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      refresh_token:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [Authentication]
      summary: Refresh access token
      description: Exchange a refresh token for a new access token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      refresh_token:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/logout:
    post:
      operationId: logout
      tags: [Authentication]
      summary: Invalidate refresh token
      description: Logs out the user by invalidating the refresh token.
      responses:
        '204':
          description: Logout successful
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /items/{collection}:
    get:
      operationId: listItems
      tags: [Items]
      summary: List items from a collection
      description: Retrieve items from any collection with filtering, sorting, field selection, and pagination.
      parameters:
        - $ref: '#/components/parameters/CollectionPath'
        - $ref: '#/components/parameters/FilterQuery'
        - $ref: '#/components/parameters/SortQuery'
        - $ref: '#/components/parameters/FieldsQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/AggregateQuery'
        - $ref: '#/components/parameters/GroupQuery'
      responses:
        '200':
          description: List of items
          headers:
            X-Total-Count:
              schema:
                type: integer
              description: Total number of items matching the query
            X-Page-Count:
              schema:
                type: integer
              description: Total number of pages
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      operationId: createItem
      tags: [Items]
      summary: Create one or many items
      description: Create one item or an array of items in the specified collection.
      parameters:
        - $ref: '#/components/parameters/CollectionPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                - type: array
                  items:
                    type: object
      responses:
        '200':
          description: Item(s) created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - type: object
                      - type: array
                        items:
                          type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /items/{collection}/{id}:
    get:
      operationId: getItem
      tags: [Items]
      summary: Get a single item
      description: Retrieve a single item by its ID with optional field selection.
      parameters:
        - $ref: '#/components/parameters/CollectionPath'
        - $ref: '#/components/parameters/ItemIdPath'
        - $ref: '#/components/parameters/FieldsQuery'
      responses:
        '200':
          description: Item retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      operationId: updateItem
      tags: [Items]
      summary: Update an item
      parameters:
        - $ref: '#/components/parameters/CollectionPath'
        - $ref: '#/components/parameters/ItemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Item updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      operationId: deleteItem
      tags: [Items]
      summary: Delete an item
      parameters:
        - $ref: '#/components/parameters/CollectionPath'
        - $ref: '#/components/parameters/ItemIdPath'
      responses:
        '204':
          description: Item deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /items/{collection}/aggregate:
    get:
      operationId: aggregateItems
      tags: [Items]
      summary: Aggregate items
      description: Perform aggregation queries on a collection with optional grouping.
      parameters:
        - $ref: '#/components/parameters/CollectionPath'
        - name: groupBy
          in: query
          description: Fields to group by (comma-separated)
          schema:
            type: string
        - name: aggregate
          in: query
          description: Aggregation functions (comma-separated)
          schema:
            type: string
            enum: [count, sum, avg, min, max]
        - $ref: '#/components/parameters/FilterQuery'
      responses:
        '200':
          description: Aggregation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /schema/snapshot:
    get:
      operationId: getSchemaSnapshot
      tags: [Schema]
      summary: Export database schema
      description: Returns the current schema snapshot including all collections, fields, and relations.
      responses:
        '200':
          description: Schema snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /schema/diff:
    post:
      operationId: computeSchemaDiff
      tags: [Schema]
      summary: Compute schema diff
      description: Compute the differences between the current schema and a provided schema snapshot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Schema diff results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /schema/apply:
    post:
      operationId: applySchemaChanges
      tags: [Schema]
      summary: Apply schema changes
      description: Apply schema changes from a computed diff or provided schema definition.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Schema changes applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /graphql:
    post:
      operationId: graphqlQuery
      tags: [GraphQL]
      summary: Execute GraphQL query
      description: Execute a GraphQL query or mutation against the entire schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: GraphQL query or mutation string
                variables:
                  type: object
                  description: Query variables
      responses:
        '200':
          description: GraphQL response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                        locations:
                          type: array
                        path:
                          type: array
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /files:
    post:
      operationId: uploadFile
      tags: [Files]
      summary: Upload a file
      description: Upload a file using multipart/form-data encoding.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                folder:
                  type: string
                  description: Folder ID to store the file in
      responses:
        '200':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /files/{id}:
    get:
      operationId: getFile
      tags: [Files]
      summary: Get file metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileObject'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /files/{id}/download:
    get:
      operationId: downloadFile
      tags: [Files]
      summary: Download file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

