name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      POSTGRES_PASSWORD: ci-placeholder
      CLICKHOUSE_PASSWORD: ci-placeholder
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run CI check script
        run: ./scripts/ci-check.sh

      - name: Run CLI smoke tests
        run: python3 -m tests.test_cli

      - name: Run attestation tests
        run: python3 -m tests.test_attestation

      - name: Run integration tests
        run: python3 -m tests.test_forecast && python3 -m tests.test_fortune500 && python3 -m tests.test_ingestion_retry

      - name: Run SDK smoke tests
        run: python3 -m tests.test_sdk

  hooks:
    name: Directus hooks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: extensions/kokonut-hooks
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extensions/kokonut-hooks/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Run workflow unit tests
        run: npm test

  contracts:
    name: Foundry contracts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        run: forge test -vvv
